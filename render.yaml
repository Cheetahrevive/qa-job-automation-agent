services:
  - type: web
    name: qa-job-agent
    env: python
    buildCommand: |
      pip install -r requirements.txt
      python -m spacy download en_core_web_lg
      python scripts/init_db.py
    startCommand: gunicorn web_dashboard.app:app --bind 0.0.0.0:$PORT --worker-class eventlet -w 1
    envVars:
      - key: FLASK_APP
        value: web_dashboard.app
      - key: FLASK_ENV
        value: production
      - key: SECRET_KEY
        generateValue: true
      - key: PORT
        value: 10000
      - key: ADMIN_USERNAME
        sync: false
      - key: ADMIN_PASSWORD
        sync: false
      - key: FIRST_NAME
        sync: false
      - key: LAST_NAME
        sync: false
      - key: EMAIL
        sync: false
      - key: EMAIL_PASSWORD
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: LINKEDIN_API_KEY
        sync: false
    autoDeploy: true
